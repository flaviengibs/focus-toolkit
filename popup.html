<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <title>Focus Toolkit</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <h1>Focus Toolkit</h1>

  <section>
    <h2>To-do</h2>
    <input id="todoInput" placeholder="Nouvelle tâche..." />
    <button id="addTodo">Ajouter</button>
    <ul id="todoList"></ul>
  </section>

  <section>
    <h2>Notes rapides</h2>
    <textarea id="noteInput" placeholder="Écrire une note..."></textarea>
    <button id="saveNote">Sauvegarder</button>
    <ul id="noteList"></ul>
  </section>

  <section>
    <h2>Onglets</h2>
    <button id="saveTab">Sauvegarder onglet actuel</button>
    <ul id="tabList"></ul>
  </section>

  <script src="popup.js"></script>
</body>
</html>
